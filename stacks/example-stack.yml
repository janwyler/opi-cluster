version: '3.8'

services:
  web:
    image: nginx:alpine
    ports:
      - '80:80'
    networks:
      - cluster-net
    deploy:
      replicas: 3
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s

networks:
  cluster-net:
    external: true
