---

# Schritt 1: Manager initialisieren
- name: Swarm Manager initialisieren
  hosts: manager
  become: yes

  tasks:

    - name: Prüfen ob Swarm bereits aktiv
      shell: docker info 2>/dev/null | grep -i "swarm:" | awk '{print $2}'
      register: swarm_state
      changed_when: false

    - name: Swarm initialisieren
      shell: docker swarm init --advertise-addr {{ ansible_host }}
      when: swarm_state.stdout != 'active'

    - name: Worker-Token abrufen
      shell: docker swarm join-token -q worker
      register: worker_token
      changed_when: false

    - name: Fakten speichern
      set_fact:
        swarm_manager_ip: "{{ ansible_host }}"
        swarm_worker_token: "{{ worker_token.stdout }}"

# Schritt 2: Worker joinen
- name: Worker Nodes joinen
  hosts: workers
  become: yes

  tasks:

    - name: Prüfen ob Node bereits im Swarm
      shell: docker info 2>/dev/null | grep -i "swarm:" | awk '{print $2}'
      register: swarm_state
      changed_when: false

    - name: Worker dem Swarm joinen
      shell: >
        docker swarm join
        --token {{ hostvars[groups['manager'][0]]['swarm_worker_token'] }}
        {{ hostvars[groups['manager'][0]]['swarm_manager_ip'] }}:2377
      when: swarm_state.stdout != 'active'

# Schritt 3: Status anzeigen
- name: Swarm Status
  hosts: manager
  become: yes

  tasks:

    - name: Node-Liste anzeigen
      shell: docker node ls
      register: node_list
      changed_when: false

    - name: Ausgabe
      debug:
        var: node_list.stdout_lines
